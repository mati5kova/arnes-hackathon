name: CI

on:
  push:
    paths:
      - "arnes-hackathon-backend/**"
      - "arnes-hackathon-frontend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "arnes-hackathon-backend/**"
      - "arnes-hackathon-frontend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arnes-hackathon-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arnes-hackathon-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: arnes-hackathon-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test
